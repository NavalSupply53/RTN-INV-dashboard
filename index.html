<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RTN Mission Control - Headers Fixed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --navy: #0a192f; --accent: #00d4ff; }
        body { background: var(--navy); color: white; font-family: 'Sarabun', sans-serif; height: 100vh; margin: 0; overflow: hidden; }
        #wrapper { display: grid; grid-template-columns: 320px 1fr 320px; grid-template-rows: 1fr 220px; height: 100vh; }
        .sidebar { background: rgba(10, 25, 47, 0.95); padding: 15px; border: 1px solid #172a45; overflow-y: auto; }
        #map { grid-column: 2; position: relative; }
        .bottom-panel { grid-column: 1 / 4; background: #020c1b; border-top: 2px solid var(--accent); padding: 10px; overflow-y: auto; }
        .loading { position: fixed; inset: 0; background: var(--navy); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .table-custom { font-size: 0.75rem; color: #ccd6f6; }
        .table-custom thead { background: #1d3354; color: var(--accent); }
    </style>
</head>
<body>

<div id="loader" class="loading">
    <div class="spinner-border text-info mb-3"></div>
    <h4>📡 กำลังซิงค์ข้อมูลหัวตารางใหม่...</h4>
</div>

<div id="wrapper">
    <aside class="sidebar">
        <h5 class="text-info border-bottom pb-2">⚓ Base Logistics</h5>
        <div class="mt-4">
            <h6 id="current-base-text" class="text-warning text-center">เลือกฐานทัพในแผนที่</h6>
            <canvas id="logiChart"></canvas>
        </div>
    </aside>

    <main id="map">
        <div id="map-div" style="height: 100%;"></div>
    </main>

    <aside class="sidebar">
        <h5 class="text-danger border-bottom pb-2">🏥 Medical Facility</h5>
        <div class="mt-4 text-center">
            <canvas id="medChart"></canvas>
            <div id="bed-info" class="mt-3 fw-bold fs-5"></div>
        </div>
    </aside>

    <section class="bottom-panel">
        <h6 class="text-warning mb-2">🚢 สถานภาพกำลังรบ (ดึงข้อมูลจาก Ship_Summary)</h6>
        <table class="table table-dark table-sm table-hover table-custom">
            <thead id="ship-header">
                </thead>
            <tbody id="ship-body">
                <tr><td colspan="15" class="text-center text-secondary">รอการเชื่อมต่อฐานข้อมูล...</td></tr>
            </tbody>
        </table>
    </section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqKTsZLO8hEYr4eSK1imLpVUDAaP-UGCrqTYcHMPdRnXZwit1GmpKCPOdMwC6t5QyVVcKWgm7JFIq8/pub?output=csv";
    
    // ตั้งค่า GID ตามที่คุณเช็คจากหน้าเว็บ
    const GID_BASE = "2038450809"; 
    const GID_SHIP = "1437423423"; 
    const GID_MEDI = "2038450809"; // แก้เป็นเลข GID ของหน้า Medical_Status หากทราบแล้ว

    let store = { base: [], ship: [], medi: [] };
    let cLogi, cMedi;

    const map = L.map('map-div').setView([10.0, 101.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const baseCoords = { sat: [12.6571, 100.8843], son: [7.2161, 100.5820] };

    async function fetchData() {
        const pull = (gid) => fetch(`${SHEET_CSV}&gid=${gid}&nocache=${Date.now()}`).then(r => r.text());
        try {
            const [b, s, m] = await Promise.all([pull(GID_BASE), pull(GID_SHIP), pull(GID_MEDI)]);
            
            // ใช้ PapaParse แปลง CSV เป็น Object โดยใช้ชื่อหัวตารางเป็น Key
            store.base = Papa.parse(b, {header:true, skipEmptyLines:true}).data;
            store.ship = Papa.parse(s, {header:true, skipEmptyLines:true}).data;
            store.medi = Papa.parse(m, {header:true, skipEmptyLines:true}).data;
            
            renderAll();
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            console.error("Fetch Error:", e);
            alert("ไม่สามารถโหลดข้อมูลได้ ตรวจสอบเลข GID และการ Publish CSV");
        }
    }

    function renderAll() {
        // วางหมุดฐานทัพ
        L.marker(baseCoords.sat).addTo(map).bindPopup("ฐานทัพเรือสัตหีบ").on('click', () => updateBaseChart("ฐานทัพเรือสัตหีบ"));
        L.marker(baseCoords.son).addTo(map).bindPopup("ฐานทัพเรือสงขลา").on('click', () => updateBaseChart("ฐานทัพเรือสงขลา"));

        // สร้างตารางเรือแบบ Dynamic ตามหัวตารางที่มี Underline ใน Google Sheet
        if (store.ship.length > 0) {
            const headers = Object.keys(store.ship[0]);
            
            // สร้างหัวตาราง (Thead)
            document.getElementById('ship-header').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
            
            // สร้างข้อมูลในตาราง (Tbody)
            document.getElementById('ship-body').innerHTML = store.ship.map(row => {
                return `<tr>${headers.map(h => `<td>${row[h] || '-'}</td>`).join('')}</tr>`;
            }).join('');
        }
        
        updateBaseChart("ฐานทัพเรือสัตหีบ");
    }

    function updateBaseChart(baseName) {
        // ค้นหาแถวที่มีชื่อฐานทัพตรงกัน
        const row = store.base.find(r => Object.values(r).includes(baseName));
        if (!row) return;

        document.getElementById('current-base-text').innerText = baseName;
        const ctx = document.getElementById('logiChart').getContext('2d');
        if (cLogi) cLogi.destroy();
        
        // ใช้ชื่อหัวตารางแบบมี Underline ตามภาพที่ 12
        cLogi = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['MRE', 'Fuel', 'Harpoon'],
                datasets: [{
                    label: 'Status (%)',
                    data: [
                        parseFloat(row.MRE_Current) || 0, 
                        parseFloat(row.Fuel_Current) || 0, 
                        parseFloat(row.Harpoon_Current) || 0
                    ],
                    backgroundColor: ['#20c997', '#ffc107', '#ff6384']
                }]
            },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    fetchData();
</script>
</body>
</html>
