<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naval Base & Fleet Readiness Dashboard (Ship Plotting Fixed)</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #1e1e2f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        .top-section {
            display: flex;
            flex: 6.5;
            gap: 10px;
            min-height: 0;
        }

        .bottom-section {
            flex: 3.5;
            background-color: #2a2a3c;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #3f3f5a;
        }

        .side-panel {
            flex: 2.5;
            background-color: #2a2a3c;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #3f3f5a;
        }

        .map-panel {
            flex: 5;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 2px solid #3f3f5a;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: #1a1a24;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e2f; }
        ::-webkit-scrollbar-thumb { background: #4a4a6a; border-radius: 4px; }

        #cursor-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: #00ffcc;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
            display: none;
            border: 1px solid #00ffcc;
        }

        .static-travel-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(30, 30, 47, 0.9);
            border: 1px solid #4a4a6a;
            padding: 12px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 11px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 30, 47, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .progress {
            height: 12px;
            background-color: #3f3f5a;
        }

        /* Custom Marker Styles */
        .ship-icon {
            text-shadow: 0 0 5px #000;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-info" role="status"></div>
    <span class="ms-3 mt-2">กำลังซิงค์ข้อมูลยุทธการและพิกัดเรือ...</span>
    <div id="error-status" class="px-3 text-center mt-2"></div>
    <button id="retry-btn" class="btn btn-sm btn-info mt-3" style="display:none;" onclick="refreshDashboard()">Retry Sync</button>
</div>

<div class="dashboard-container">
    <div class="top-section">
        <!-- Base Readiness Panel -->
        <div class="side-panel">
            <h6 class="text-center text-info mb-3 border-bottom border-secondary pb-2">📦 สถานภาพ สป. (%)</h6>
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span class="badge bg-warning text-dark">📍 สัตหีบ</span>
                    <small id="stat-sat-avg" class="text-info"></small>
                </div>
                <canvas id="chartSattahip" height="220"></canvas>
            </div>
            <div>
                <div class="d-flex justify-content-between mb-1">
                    <span class="badge bg-warning text-dark">📍 สงขลา</span>
                    <small id="stat-son-avg" class="text-info"></small>
                </div>
                <canvas id="chartSongkhla" height="220"></canvas>
            </div>
        </div>

        <!-- Map Panel -->
        <div class="map-panel">
            <div id="map"></div>
            <div id="cursor-tooltip">
                <div id="dist-sattahip"></div>
                <div id="dist-songkhla"></div>
            </div>
            <div class="static-travel-info">
                <h6 class="text-warning mb-2">⏱️ การเดินทาง สัตหีบ - สงขลา</h6>
                <div>🚢 เรือรบ (15 kts): ~23 ชม.</div>
                <div>✈️ เครื่องบิน: ~1.5 ชม.</div>
                <div>🚗 รถยนต์: ~14 ชม.</div>
            </div>
        </div>

        <!-- Medical Panel -->
        <div class="side-panel">
            <h6 class="text-center text-success mb-3 border-bottom border-secondary pb-2">🏥 ความพร้อมเตียง</h6>
            <div id="hospital-container"></div>
        </div>
    </div>

    <!-- Ship Table Panel -->
    <div class="bottom-section">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="text-info m-0">⚓ สถานภาพความพร้อมเรือ (จำกัด 11 ลำ)</h6>
            <div class="d-flex align-items-center">
                <div id="connection-status" class="me-3 small"><span class="status-dot bg-secondary"></span>ตรวจสอบการเชื่อมต่อ...</div>
                <small id="last-update" class="text-muted"></small>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-dark table-sm table-hover border-secondary">
                <thead class="sticky-top bg-dark">
                    <tr>
                        <th>#</th>
                        <th>ชื่อเรือ</th>
                        <th>ประเภท</th>
                        <th class="text-center">Readiness</th>
                        <th>สถานะ</th>
                        <th>หมายเหตุ</th>
                    </tr>
                </thead>
                <tbody id="ship-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const COORDS_SATTAHIP = [12.6569, 100.8842];
    const COORDS_SONGKHLA = [7.2023, 100.5750];
    
    const GID = { 
        base: "2038450809", 
        ship: "1437423423", 
        medical: "834549020" 
    };

    const PROXIES = [
        "https://api.allorigins.win/raw?url=",
        "https://api.codetabs.com/v1/proxy?quest=",
        "https://corsproxy.io/?"
    ];
    
    const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqKTsZLO8hEYr4eSK1imLpVUDAaP-UGCrqTYcHMPdRnXZwit1GmpKCPOdMwC6t5QyVVcKWgm7JFIq8/pub?output=csv";

    // Map Setup
    const map = L.map('map').setView([10.0, 101.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    
    // Base Markers
    L.marker(COORDS_SATTAHIP).addTo(map).bindPopup("<b>ฐานทัพเรือสัตหีบ</b>");
    L.marker(COORDS_SONGKHLA).addTo(map).bindPopup("<b>ฐานทัพเรือสงขลา</b>");
    
    const lineSat = L.polyline([], {color: '#ff4444', dashArray: '5, 10', weight: 1}).addTo(map);
    const lineSon = L.polyline([], {color: '#4444ff', dashArray: '5, 10', weight: 1}).addTo(map);
    let shipMarkers = L.layerGroup().addTo(map);

    map.on('mousemove', (e) => {
        const cursor = e.latlng;
        lineSat.setLatLngs([COORDS_SATTAHIP, cursor]);
        lineSon.setLatLngs([COORDS_SONGKHLA, cursor]);
        const dSatNM = (turf.distance(turf.point([COORDS_SATTAHIP[1], COORDS_SATTAHIP[0]]), turf.point([cursor.lng, cursor.lat])) / 1.852).toFixed(2);
        const dSonNM = (turf.distance(turf.point([COORDS_SONGKHLA[1], COORDS_SONGKHLA[0]]), turf.point([cursor.lng, cursor.lat])) / 1.852).toFixed(2);
        $('#cursor-tooltip').show().css({ left: e.containerPoint.x + 15, top: e.containerPoint.y + 15 });
        $('#dist-sattahip').html(`Sattahip: ${dSatNM} NM`);
        $('#dist-songkhla').html(`Songkhla: ${dSonNM} NM`);
    });

    // Helpers
    function getVal(row, key, index) {
        if (!row) return 0;
        const rowKeys = Object.keys(row);
        if (row[key] !== undefined && row[key] !== "") return row[key];
        return row[rowKeys[index]] || 0;
    }

    function parseNum(val) {
        if (typeof val === 'string') return parseFloat(val.replace(/,/g, '')) || 0;
        return parseFloat(val) || 0;
    }

    async function fetchCSV(gid) {
        const fullUrl = `${BASE_URL}&gid=${gid}`;
        for (const proxy of PROXIES) {
            try {
                const response = await fetch(proxy + encodeURIComponent(fullUrl));
                if (!response.ok) continue;
                const text = await response.text();
                return new Promise((resolve) => {
                    Papa.parse(text, { header: true, skipEmptyLines: true, complete: (res) => resolve(res.data) });
                });
            } catch (e) { console.warn("Proxy Failed:", proxy); }
        }
        throw new Error("Connection failed");
    }

    let charts = {};

    function updateBaseCharts(data) {
        if (!data) return;
        const configs = [
            { name: "ฐานทัพเรือสัตหีบ", chartId: "chartSattahip", avgId: "stat-sat-avg" },
            { name: "ฐานทัพเรือสงขลา", chartId: "chartSongkhla", avgId: "stat-son-avg" }
        ];

        configs.forEach(cfg => {
            const row = data.find(r => Object.values(r).includes(cfg.name)) || data[0];
            if (!row) return;

            const items = [
                { label: 'MRE', curIdx: 2, objIdx: 1 },
                { label: 'Fuel', curIdx: 4, objIdx: 3 },
                { label: 'Harpoon', curIdx: 6, objIdx: 5 },
                { label: 'B1C', curIdx: 8, objIdx: 7 },
                { label: 'ESSM', curIdx: 10, objIdx: 9 }
            ];

            const percentages = items.map(item => {
                const cur = parseNum(getVal(row, "", item.curIdx));
                const obj = parseNum(getVal(row, "", item.objIdx)) || 1;
                return Math.min(100, Math.round((cur / obj) * 100));
            });

            const avg = Math.round(percentages.reduce((a, b) => a + b, 0) / percentages.length);
            $(`#${cfg.avgId}`).text(`ความพร้อม: ${avg}%`);

            if (charts[cfg.chartId]) charts[cfg.chartId].destroy();
            charts[cfg.chartId] = new Chart(document.getElementById(cfg.chartId), {
                type: 'bar',
                data: { 
                    labels: items.map(i => i.label), 
                    datasets: [{ 
                        data: percentages, 
                        backgroundColor: percentages.map(p => p > 80 ? '#28a745' : p >= 50 ? '#ffc107' : '#dc3545')
                    }] 
                },
                options: { 
                    indexAxis: 'y', 
                    plugins: { legend: { display: false } }, 
                    scales: { x: { min: 0, max: 100, grid: { color: '#333' } } },
                    color: '#fff' 
                }
            });
        });
    }

    function updateShipTableAndMap(data) {
        const tbody = $('#ship-table-body').empty();
        shipMarkers.clearLayers();
        if (!data) return;

        // กรองเอาเฉพาะ 11 ลำแรก
        const limitedData = data.slice(0, 11);

        limitedData.forEach((r, i) => {
            const name = getVal(r, "SHIP_Name", 1);
            const type = getVal(r, "SHIP_Type", 2);
            const lat = parseNum(getVal(r, "Latitude", 4));
            const lng = parseNum(getVal(r, "Longitude", 5));
            const score = parseInt(getVal(r, "Readiness_Score", 16)) || 0;
            const status = getVal(r, "Status", 17);
            const remark = getVal(r, "Remark", 18);
            
            const colorClass = score > 80 ? 'text-success' : score >= 50 ? 'text-warning' : 'text-danger';
            const progressColor = score > 80 ? 'bg-success' : score >= 50 ? 'bg-warning' : 'bg-danger';

            // 1. Update Table
            tbody.append(`
                <tr>
                    <td>${i+1}</td>
                    <td class="fw-bold text-info">${name}</td>
                    <td><small>${type}</small></td>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="progress w-100 me-2">
                                <div class="progress-bar ${progressColor}" style="width: ${score}%"></div>
                            </div>
                            <span class="${colorClass} fw-bold">${score}%</span>
                        </div>
                    </td>
                    <td><span class="badge ${score > 80 ? 'bg-success' : 'bg-secondary'}">${status}</span></td>
                    <td><small class="text-muted">${remark}</small></td>
                </tr>
            `);

            // 2. Update Map Markers
            if (lat !== 0 && lng !== 0) {
                const markerHtml = `<div class="ship-icon" style="color: ${score > 80 ? '#28a745' : score >= 50 ? '#ffc107' : '#dc3545'}">⚓</div>`;
                const icon = L.divIcon({ html: markerHtml, className: 'custom-div-icon', iconSize: [20, 20] });
                
                L.marker([lat, lng], { icon: icon })
                    .addTo(shipMarkers)
                    .bindPopup(`<b>${name}</b><br>ประเภท: ${type}<br>ความพร้อม: ${score}%<br>สถานะ: ${status}`);
            }
        });
    }

    function updateMedical(data) {
        const container = $('#hospital-container').empty();
        if (!data) return;
        data.forEach((r, i) => {
            const id = `med-${i}`;
            container.append(`<canvas id="${id}" class="mb-3"></canvas>`);
            const hName = getVal(r, "Hospital_Name", 2);
            const total = parseInt(getVal(r, "Total_Beds", 3)) || 1;
            const occ = parseInt(getVal(r, "Occupied_Beds", 4)) || 0;

            new Chart(document.getElementById(id), {
                type: 'doughnut',
                data: { 
                    labels: ['ครองเตียง', 'ว่าง'], 
                    datasets: [{ data: [occ, Math.max(0, total-occ)], backgroundColor: ['#dc3545', '#28a745'], borderWidth: 0 }] 
                },
                options: { 
                    cutout: '75%', 
                    plugins: { 
                        title: { display: true, text: hName, color: '#fff', font: { size: 13 } }, 
                        legend: { display: false } 
                    } 
                }
            });
        });
    }

    async function refreshDashboard() {
        $('#loader').show();
        $('#retry-btn').hide();
        $('#connection-status').html('<span class="status-dot bg-warning"></span>กำลังดึงข้อมูล...');

        try {
            const [b, s, m] = await Promise.all([
                fetchCSV(GID.base),
                fetchCSV(GID.ship),
                fetchCSV(GID.medical)
            ]);

            updateBaseCharts(b);
            updateShipTableAndMap(s);
            updateMedical(m);

            $('#last-update').text(`อัปเดต: ${new Date().toLocaleTimeString()}`);
            $('#connection-status').html('<span class="status-dot bg-success"></span>เชื่อมต่อสำเร็จ');
            $('#loader').fadeOut();
        } catch (err) {
            $('#connection-status').html('<span class="status-dot bg-danger"></span>ล้มเหลว');
            $('#error-status').html(`<div class="alert alert-danger p-2 small">${err.message}</div>`);
            $('#retry-btn').show();
        }
    }

    $(document).ready(() => {
        refreshDashboard();
        setInterval(refreshDashboard, 300000); 
    });
</script>
</body>
</html>
